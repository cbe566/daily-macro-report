name: 每日宏觀資訊報告

on:
  schedule:
    # 台北時間 07:30 = UTC 23:30（前一天），週一到週五
    - cron: '30 23 * * 0-4'
  workflow_dispatch:  # 手動觸發

env:
  TZ: Asia/Taipei
  POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

permissions:
  contents: write

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance requests beautifulsoup4 exchange_calendars numpy pandas weasyprint google-auth google-auth-oauthlib google-api-python-client
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk chromium-browser || true

      - name: Collect market data
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.market_data import get_asia_indices, get_europe_indices, get_us_indices, get_commodities, get_forex, get_bonds, get_crypto
          data = {
              'asia_indices': get_asia_indices(),
              'europe_indices': get_europe_indices(),
              'us_indices': get_us_indices(),
              'commodities': get_commodities(),
              'forex': get_forex(),
              'bonds': get_bonds(),
              'crypto': get_crypto(),
          }
          with open('reports/market_data_today.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2, default=str)
          print(f'Market data: {sum(len(v) for v in data.values())} items')
          "

      - name: Collect news
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.news_collector import get_news_for_date
          news = get_news_for_date()
          with open('reports/news_today.json', 'w', encoding='utf-8') as f:
              json.dump(news, f, ensure_ascii=False, indent=2, default=str)
          print(f'News: {len(news[\"articles\"])} articles')
          "

      - name: Scan hot stocks
        timeout-minutes: 15
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.hot_stocks import get_all_hot_stocks
          with open('reports/news_today.json') as f:
              news = json.load(f)
          hot = get_all_hot_stocks(news_trending_tickers=news.get('trending_tickers', []))
          with open('reports/hot_stocks_today.json', 'w', encoding='utf-8') as f:
              json.dump(hot, f, ensure_ascii=False, indent=2, default=str)
          total = sum(len(d.get('inflow',[])) + len(d.get('outflow',[])) for d in hot.values())
          print(f'Hot stocks: {total}')
          "

      - name: Collect enhanced data
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.sentiment_data import collect_all_enhanced_data
          from modules.enhanced_market_data import collect_all_enhanced_v2
          v1 = collect_all_enhanced_data()
          v2 = collect_all_enhanced_v2()
          with open('reports/enhanced_today.json', 'w', encoding='utf-8') as f:
              json.dump(v1, f, ensure_ascii=False, indent=2, default=str)
          with open('reports/enhanced_v2_today.json', 'w', encoding='utf-8') as f:
              json.dump(v2, f, ensure_ascii=False, indent=2, default=str)
          print('Enhanced data collected')
          "

      - name: Collect FRED economic data
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.fred_data import collect_fred_data
          data = collect_fred_data()
          with open('reports/fred_today.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2, default=str)
          meta = data.get('metadata', {})
          print(f'FRED data: {meta.get(\"series_fetched\",0)}/{meta.get(\"series_total\",0)} series')
          "

      - name: Collect alternative data
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.alternative_data import collect_alternative_data
          data = collect_alternative_data()
          with open('reports/alternative_today.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2, default=str)
          print('Alternative data collected')
          "

      - name: Generate report
        run: python3 scripts/generate_full_report.py

      - name: Generate PDF
        run: |
          DATE=$(TZ='Asia/Taipei' date +%Y-%m-%d)
          HTML_FILE="reports/daily_report_${DATE}.html"
          PDF_FILE="reports/daily_report_${DATE}.pdf"
          if command -v chromium-browser &>/dev/null; then
            chromium-browser --headless --no-sandbox --disable-gpu \
              --print-to-pdf="${PDF_FILE}" --print-to-pdf-no-header \
              "file://$(pwd)/${HTML_FILE}" || true
          fi
          if [ ! -f "${PDF_FILE}" ] || [ $(stat -c%s "${PDF_FILE}" 2>/dev/null || echo 0) -lt 1000 ]; then
            python3 -c "
          from weasyprint import HTML
          HTML('${HTML_FILE}').write_pdf('${PDF_FILE}')
          print('PDF generated with WeasyPrint')
          "
          fi
          ls -la "${PDF_FILE}"

      - name: Send email
        run: |
          python3 -c "
          import smtplib, os, sys
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.base import MIMEBase
          from email import encoders
          from datetime import datetime

          sys.path.insert(0, '.')
          DATE = datetime.now().strftime('%Y-%m-%d')
          PDF_PATH = f'reports/daily_report_{DATE}.pdf'
          HTML_PATH = f'reports/daily_report_{DATE}.html'

          html_body = ''
          if os.path.exists(HTML_PATH):
              with open(HTML_PATH, 'r', encoding='utf-8') as f:
                  html_body = f.read()

          msg = MIMEMultipart()
          msg['From'] = 'backup901012@gmail.com'
          msg['To'] = 'cbe566@gmail.com'
          msg['Subject'] = f'每日宏觀資訊綜合早報 | {DATE}'

          if html_body:
              msg.attach(MIMEText(html_body, 'html', 'utf-8'))
          else:
              msg.attach(MIMEText(f'{DATE} 報告請見附件', 'plain', 'utf-8'))

          if os.path.exists(PDF_PATH):
              with open(PDF_PATH, 'rb') as f:
                  att = MIMEBase('application', 'pdf')
                  att.set_payload(f.read())
                  encoders.encode_base64(att)
                  att.add_header('Content-Disposition', 'attachment', filename=f'daily_report_{DATE}.pdf')
                  msg.attach(att)

          server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
          server.login('backup901012@gmail.com', 'mlrw darm xibx jxrk')
          server.sendmail('backup901012@gmail.com', ['cbe566@gmail.com'], msg.as_string())
          server.quit()
          print(f'Email sent to cbe566@gmail.com')
          "

      - name: Commit data to repo
        run: |
          DATE=$(TZ='Asia/Taipei' date +%Y-%m-%d)
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add reports/ -f
          git commit -m "data: ${DATE} 報告已生成並發送" || echo "No changes to commit"
          git push origin master || echo "Push failed, non-critical"
